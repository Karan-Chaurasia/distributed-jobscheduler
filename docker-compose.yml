# =============================================================================
# Local infrastructure for the Distributed Job Scheduler.
#
# Only two services are needed:
#   - postgres : primary datastore AND the job queue (claimed via SKIP LOCKED)
#   - redis    : JWT blacklist + response cache
#
# The application and its embedded worker run on the host (mvn spring-boot:run)
# or can be containerised separately. No message broker is required.
# =============================================================================
services:
  postgres:
    image: postgres:16-alpine
    container_name: scheduler-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-scheduler_db}
      POSTGRES_USER: ${DB_USER:-scheduler_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-scheduler_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-scheduler_user} -d ${DB_NAME:-scheduler_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scheduler-net

  redis:
    image: redis:7-alpine
    container_name: scheduler-redis
    # No password for local dev (matches REDIS_PASSWORD="" in .env.example).
    # For a secured deployment, run: redis-server --requirepass "<your-password>"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scheduler-net

volumes:
  postgres_data:
  redis_data:

networks:
  scheduler-net:
    driver: bridge
